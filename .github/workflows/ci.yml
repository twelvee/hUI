name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  BUILD_TYPE: Release
  INSTALL_DIR: ${{ github.workspace }}/install

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove previous install dir (Unix)
        if: runner.os != 'Windows'
        run: cmake -E rm -rf "$INSTALL_DIR"

      - name: Remove previous install dir (Windows)
        if: runner.os == 'Windows'
        run: cmake -E rm -rf "$env:INSTALL_DIR"
        shell: pwsh

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
          -DHUI_BUILD_RAYLIB_EXAMPLE=OFF
          -DCMAKE_INSTALL_PREFIX=${INSTALL_DIR}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE
          -DHUI_BUILD_RAYLIB_EXAMPLE=OFF
          -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR"
        shell: pwsh

      - name: Build
        if: runner.os != 'Windows'
        run: cmake --build build --config ${BUILD_TYPE} --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config $env:BUILD_TYPE --parallel
        shell: pwsh

      - name: Run tests
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure --build-config $env:BUILD_TYPE
        shell: pwsh

      - name: Install
        if: runner.os != 'Windows'
        run: cmake --install build --config ${BUILD_TYPE}

      - name: Install (Windows)
        if: runner.os == 'Windows'
        run: cmake --install build --config $env:BUILD_TYPE
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hui-${{ runner.os }}-${{ env.BUILD_TYPE }}
          path: ${{ env.INSTALL_DIR }}
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Debug
      INSTALL_DIR: ${{ github.workspace }}/coverage-install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install coverage tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install gcovr

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
          -DHUI_BUILD_RAYLIB_EXAMPLE=OFF
          -DHUI_ENABLE_COVERAGE=ON
          -DCMAKE_INSTALL_PREFIX=${INSTALL_DIR}

      - name: Build
        run: cmake --build build --config ${BUILD_TYPE} --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage reports
        run: |
          gcovr -r .. --exclude 'tests/.*' --xml-pretty --output coverage.xml
          gcovr -r .. --exclude 'tests/.*' --html-details --output coverage.html
          gcovr -r .. --exclude 'tests/.*' --json-summary --output coverage.json
          gcovr -r .. --exclude 'tests/.*'
        working-directory: build

      - name: Extract coverage
        id: coverage
        run: |
          python -c "import json, os; data=json.load(open('coverage.json', 'r', encoding='utf-8')); percent=float(data.get('line_percent', 0.0)); color=('brightgreen' if percent>=90.0 else 'yellow' if percent>=75.0 else 'orange' if percent>=50.0 else 'red'); out=os.environ['GITHUB_OUTPUT']; open(out, 'a', encoding='utf-8').write(f'percent={percent:.2f}\ncolor={color}\n')"
        working-directory: build

      - name: Prepare badges directory
        run: mkdir -p badges

      - name: Generate coverage badge
        uses: emibcn/badge-action@v2
        with:
          label: Coverage
          status: "${{ steps.coverage.outputs.percent }}%"
          color: ${{ steps.coverage.outputs.color }}
          path: badges/coverage.svg

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            build/coverage.xml
            build/coverage.html
            build/coverage.json
            badges/coverage.svg
          if-no-files-found: error

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "Update coverage badge" || exit 0
          git push
